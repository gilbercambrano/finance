# Configuración base: reverse proxy HTTP hacia la API FastAPI/Gunicorn.
#
# Para activar HTTPS con Let's Encrypt (recomendado en producción):
#   1. Asegúrate de tener un dominio apuntando a la IP de este servidor.
#   2. Descomenta el bloque "ACME challenge" de abajo y reinicia nginx.
#   3. Ejecuta certbot (ver README.md, sección "Activar HTTPS").
#   4. Agrega el bloque `listen 443 ssl;` con los certificados generados.

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Ubicación usada por certbot para validar el dominio (déjala activa).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
